        <br>

 <div class="container-cadastro">
    <h2>Cadastro</h2>
    <p>Preencha seus dados corretamente para criar sua conta.</p>

    <form id="cadastroForm">

        <label>Nome completo:</label>
        <input type="text" id="nome" placeholder="Seu nome" required>

        <label>Email:</label>
        <input type="email" id="cadastroEmail" placeholder="Seu email" required>

        <label>Senha:</label>
        <input type="password" id="cadastroSenha" placeholder="Crie uma senha" required>

        <label>Confirmar senha:</label>
        <input type="password" id="confirmarSenha" placeholder="Repita a senha" required>

        <div class="extras">
            <input type="checkbox" id="termos" required>
            <label for="termos">Aceito os termos de uso</label>
        </div>

        <button class="btn" type="submit">CADASTRAR</button>

        <div class="login-link">
            Já tem conta? <a href="login.html">Faça login</a>
        </div>

    </form>
</div>
